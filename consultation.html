<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultation by John</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Inter, sans-serif;
    background:#0f1115;
    color:#e6e6e6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:700px;
    max-width:90%;
    background:#171923;
    border:1px solid #2a2f3a;
    border-radius:12px;
    padding:25px;
    box-shadow:0 0 40px rgba(0,0,0,.5);
}

.header{
    font-size:20px;
    font-weight:600;
    margin-bottom:10px;
}

.sub{
    font-size:12px;
    color:#9aa4b2;
    margin-bottom:20px;
}

.box{
    background:#0f1115;
    border:1px solid #2a2f3a;
    border-radius:10px;
    padding:15px;
    min-height:120px;
}

textarea{
    width:100%;
    height:80px;
    background:transparent;
    border:none;
    color:white;
    outline:none;
    resize:none;
    font-size:14px;
}

button{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.ask{
    background:#3b82f6;
    color:white;
}

.paywall{
    margin-top:20px;
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    border:1px dashed #4b5563;
    text-align:center;
}

.paybtn{
    background:#22c55e;
    color:black;
    margin-top:10px;
}

.hidden{
    display:none;
}

.response{
    margin-top:20px;
    padding:15px;
    background:#0b1220;
    border-left:3px solid #3b82f6;
    white-space:pre-wrap;
    min-height:60px;
}

.typing::after{
    content:" ▍";
    animation:blink 0.8s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">💼 Consultation by John</div>
<div class="sub">Jack of All Trades • AI-style advisory interface (demo)</div>

<div class="box">
<textarea id="input" placeholder="Ask anything... business, life, ideas, coding, anything"></textarea>
<button class="ask" onclick="ask()">Ask John</button>
</div>

<div id="paywall" class="paywall">
💰 Unlock Consultation Access<br><br>
Full responses require a one-time fee of<br>
<b>500 AED</b><br>

<button class="paybtn" onclick="unlock()">Pay 500 AED (Demo)</button>
</div>

<div id="response" class="response hidden"></div>

</div>

<script>

let unlocked = false;

function unlock(){
    unlocked = true;
    document.getElementById("paywall").style.display="none";
}

function ask(){

    const input = document.getElementById("input").value;
    const response = document.getElementById("response");

    response.classList.remove("hidden");
    response.classList.add("typing");

    if(!unlocked){
        typeText(response, "Access locked 🔒\nPlease unlock consultation for 500 AED (demo mode).");
        return;
    }

    const answers = [
        "As John, Jack of All Trades, my advice is:\nBreak the problem into small systems and solve step by step.",
        "Interesting question.\nIf I were consulting this, I’d focus on speed of execution over perfection.",
        "Here’s the truth:\nMost problems are simpler than they feel. Strip away noise.",
        "Strategic view:\nYou’re either optimizing time, money, or attention. Identify which one.",
        "Recommendation:\nAct first, refine later. Momentum beats planning."
    ];

    typeText(response, answers[Math.floor(Math.random()*answers.length)]);
}

function typeText(el, text){
    el.innerText = "";
    let i = 0;

    let interval = setInterval(()=>{
        el.innerText += text[i];
        i++;
        if(i >= text.length){
            clearInterval(interval);
            el.classList.remove("typing");
        }
    }, 20);
}

</script>

</body>
</html>
