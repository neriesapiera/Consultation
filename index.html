<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultation by John</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Inter, sans-serif;
    background:#0f1115;
    color:#e6e6e6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:700px;
    max-width:90%;
    background:#171923;
    border:1px solid #2a2f3a;
    border-radius:12px;
    padding:25px;
    box-shadow:0 0 40px rgba(0,0,0,.5);
}

.header{
    font-size:20px;
    font-weight:600;
    margin-bottom:5px;
}

.sub{
    font-size:12px;
    color:#9aa4b2;
    margin-bottom:20px;
}

.box{
    background:#0f1115;
    border:1px solid #2a2f3a;
    border-radius:10px;
    padding:15px;
}

textarea{
    width:100%;
    height:90px;
    background:transparent;
    border:none;
    color:white;
    outline:none;
    resize:none;
    font-size:14px;
}

button{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    background:#3b82f6;
    color:white;
}

.response{
    margin-top:20px;
    padding:15px;
    background:#0b1220;
    border-left:3px solid #3b82f6;
    white-space:pre-wrap;
    min-height:60px;
}

.typing::after{
    content:" ▍";
    animation:blink 0.8s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">💼 Consultation by John</div>
<div class="sub">Jack of All Trades • Strategic Advisory System</div>

<div class="box">
<textarea id="input" placeholder="Ask anything..."></textarea>
<button onclick="ask()">Ask John</button>
</div>

<div id="response" class="response"></div>

</div>

<script>

function ask(){

    const input = document.getElementById("input").value.trim();
    const response = document.getElementById("response");

    response.classList.add("typing");
    response.innerText = "";

    // always show this first (your rule)
    const gateMessage = "500 AED first.\n\n";

    const answers = [
        "From a strategic perspective: simplify the problem into 2–3 core variables.",
        "The fastest path is usually not the perfect one, but the executable one.",
        "Focus on leverage: time, attention, or money — pick one to optimize.",
        "Most situations improve when you remove unnecessary complexity.",
        "Action creates clarity. Thinking alone does not."
    ];

    const finalAnswer = answers[Math.floor(Math.random()*answers.length)];

    const fullText = gateMessage + finalAnswer;

    typeText(response, fullText);
}

function typeText(el, text){
    let i = 0;
    el.innerText = "";

    const interval = setInterval(()=>{
        el.innerText += text[i];
        i++;
        if(i >= text.length){
            clearInterval(interval);
            el.classList.remove("typing");
        }
    }, 20);
}

</script>

</body>
</html>
